name: Build FNV esplugin audit

on:
  pull_request:
    paths:
      - "tools/fnv-esplugin-audit/**"
      - ".github/workflows/fnv-esplugin-audit.yml"
  push:
    branches: [main]
    paths:
      - "tools/fnv-esplugin-audit/**"
      - ".github/workflows/fnv-esplugin-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.81
      - name: Check pinned esplugin runner
        run: cargo check --locked --manifest-path tools/fnv-esplugin-audit/Cargo.toml
      - name: Build pinned esplugin runner
        run: cargo build --locked --release --manifest-path tools/fnv-esplugin-audit/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: fnv-esplugin-audit-windows
          path: tools/fnv-esplugin-audit/target/release/fnv-esplugin-audit.exe
          if-no-files-found: error
