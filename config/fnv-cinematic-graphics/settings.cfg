# Isolated high-quality capture preset for the FNV Strip cinematic.
# The retail Data directory and the normal playable profile remain untouched.

[Video]
resolution x = 1280
resolution y = 720
antialiasing = 4

[General]
anisotropy = 16

[Shaders]
force shaders = true
force per pixel lighting = true
clamp lighting = false
auto use object normal maps = true
auto use terrain normal maps = true
lighting method = shaders
max lights = 16
antialias alpha test = true
soft particles = true

[Shadows]
enable shadows = true
number of shadow maps = 4
maximum shadow map distance = 8192
shadow map resolution = 2048
actor shadows = true
player shadows = false
terrain shadows = true
object shadows = true
