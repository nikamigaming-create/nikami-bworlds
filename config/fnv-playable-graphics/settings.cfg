# Fallout: New Vegas renderer-recovery boundary.
#
# Keep world rendering on the last known working June configuration while
# native FNV shader/material semantics are still incomplete. Cell preloading is
# intentionally independent below: it may be tuned for traversal without
# enabling distant-terrain or object-paging render paths.

[Camera]
viewing distance = 10000
reverse z = false
small feature culling = false
small feature culling pixel size = 0.5

[Cells]
preload enabled = false
preload num threads = 2
preload exterior grid = false
preload fast travel = false
preload doors = true
preload distance = 8192
preload instances = false
preload cell cache min = 8
preload cell cache max = 24
preload cell expiry delay = 10
prediction time = 1
cache expiry delay = 30
target framerate = 60
pointers cache size = 100

[Terrain]
distant terrain = false
lod factor = 1.0
vertex lod mod = 0
composite map level = 0
composite map resolution = 512
max composite geometry size = 4.0
object paging = false
object paging active grid = false
object paging merge factor = 250
object paging min size = 0.01
object paging min size merge factor = 0.3
object paging min size cost multiplier = 25
water culling = true

[General]
anisotropy = 8
texture mag filter = linear
texture min filter = linear
texture mipmap = linear

[Models]
load unsupported nif files = true

[Video]
antialiasing = 2
vsync mode = 1
framerate limit = 60

[Shaders]
force shaders = false
force per pixel lighting = false
clamp lighting = false
apply lighting to environment maps = false
lighting method = shaders compatibility
maximum light distance = 4096
light fade start = 0.9
max lights = 8
antialias alpha test = false
adjust coverage for alpha test = false
soft particles = false
weather particle occlusion = false

[Shadows]
enable shadows = false
number of shadow maps = 2
maximum shadow map distance = 4096
shadow fade start = 0.9
compute scene bounds = bounds
shadow map resolution = 1024
split point uniform logarithmic ratio = 0.7
split point bias = 0
actor shadows = false
player shadows = false
terrain shadows = false
object shadows = false
enable indoor shadows = false

[Water]
shader = true
rtt size = 1024
refraction = false
reflection detail = 2
rain ripple detail = 1
small feature culling pixel size = 20
refraction scale = 1
sunlight scattering = true
wobbly shores = true
