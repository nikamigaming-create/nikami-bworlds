# Fallout: New Vegas normal-play visibility layer.
#
# Keep this scoped to FNV. The shared playable baseline deliberately bounds
# every world to its first loaded cells, while this layer restores a modest
# distant-world tier for normal FNV play and its interaction crawler.
#
# Active-grid paging remains disabled: nearby doors, activators, furniture,
# and other interactive references must continue to use their normal scene
# nodes. FNV _lod mesh selection needs a separate engine parity slice before
# this view distance can safely be raised to the retail/profile far clip.
# OpenMW's generic distant-fog mode is intentionally not enabled here: its
# weather factors are Morrowind-derived. FNV WTHR/FNAM fog is an engine slice.

[Camera]
viewing distance = 32768

[Terrain]
distant terrain = true
object paging = true
object paging active grid = false
object paging min size = 0.01
