# Fallout: New Vegas maximum-quality flat-screen graphics layer.
#
# This remains FNV-specific. Long draw distance uses reverse-Z, and active-grid
# paging stays disabled so nearby interactive references keep their authored
# scene nodes and material state. Native FNV weather remains authoritative for
# sky, cloud, image-space, and fog behavior.

[Camera]
viewing distance = 196608
reverse z = true
small feature culling = false
small feature culling pixel size = 0.5

[Cells]
preload enabled = true
preload num threads = 4
preload exterior grid = true
preload fast travel = false
preload doors = true
preload distance = 32768
preload instances = true
preload cell cache min = 24
preload cell cache max = 64
preload cell expiry delay = 5
prediction time = 1
cache expiry delay = 45
target framerate = 90
pointers cache size = 200

[Terrain]
distant terrain = true
lod factor = 1.0
vertex lod mod = 1
composite map level = 1
composite map resolution = 1024
max composite geometry size = 4.0
object paging = true
object paging active grid = false
object paging merge factor = 250
object paging min size = 0.005
object paging min size merge factor = 0.3
object paging min size cost multiplier = 25
water culling = true

[General]
anisotropy = 16
texture mag filter = linear
texture min filter = linear
texture mipmap = linear

[Video]
antialiasing = 4

[Shaders]
force shaders = true
force per pixel lighting = false
clamp lighting = false
apply lighting to environment maps = true
lighting method = shaders compatibility
maximum light distance = 16384
light fade start = 0.9
max lights = 16
antialias alpha test = false
adjust coverage for alpha test = true
soft particles = true
weather particle occlusion = false

[Shadows]
enable shadows = true
number of shadow maps = 4
maximum shadow map distance = 16384
shadow fade start = 0.9
compute scene bounds = primitives
shadow map resolution = 2048
split point uniform logarithmic ratio = 0.7
split point bias = 0
actor shadows = true
player shadows = true
terrain shadows = true
object shadows = true
enable indoor shadows = false

[Water]
shader = true
rtt size = 2048
refraction = true
reflection detail = 4
rain ripple detail = 2
small feature culling pixel size = 5
refraction scale = 1
sunlight scattering = true
wobbly shores = true
