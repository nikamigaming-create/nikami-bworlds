# Deterministic, bounded settings for the flat playable-session launcher.
# World-specific research profiles may retain aggressive distant-world experiments;
# this final config layer keeps those experiments out of the level-one baseline.

[Camera]
viewing distance = 16384

[Cells]
preload enabled = false
preload exterior grid = false
preload fast travel = false
preload doors = false
preload distance = 4096
preload instances = false
cell cache min = 2
cell cache max = 8
pointers cache size = 64

[Terrain]
distant terrain = false
object paging = false
object paging active grid = false
object paging min size = 0.1
